<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>batch178</title>
    <script>
      (function() {
        try {
          var storedTheme = localStorage.getItem('theme') || 'auto';
          var appliedTheme;
          
          if (storedTheme === 'auto') {
            var overrideDate = localStorage.getItem('themeOverrideDate');
            var today = new Date().toDateString();
            if (overrideDate === today) {
              appliedTheme = localStorage.getItem('themeOverride');
            }
            if (!appliedTheme) {
              var hour = new Date().getHours();
              appliedTheme = (hour >= 19 || hour < 7) ? 'dark' : 'light';
            }
          } else if (storedTheme === 'system') {
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            appliedTheme = prefersDark ? 'dark' : 'light';
          } else {
            appliedTheme = storedTheme;
          }
          
          document.documentElement.dataset.theme = appliedTheme;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
