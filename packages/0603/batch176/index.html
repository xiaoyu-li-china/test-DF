<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全局快捷键演示</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .container {
      max-width: 650px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    h1 {
      text-align: center;
      margin-top: 0;
      font-size: 28px;
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-top: 30px;
      margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1;
      padding: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    .tab-btn.active {
      background: rgba(255, 255, 255, 0.3);
      font-weight: bold;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .shortcut-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .shortcut-item {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
    }
    .shortcut-info {
      flex: 1;
    }
    .shortcut-desc {
      font-size: 16px;
      font-weight: 500;
    }
    .shortcut-id {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 4px;
    }
    .shortcut-edit {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .shortcut-keys {
      background: rgba(0, 0, 0, 0.3);
      padding: 10px 16px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      font-size: 14px;
      min-width: 180px;
      text-align: center;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .shortcut-keys:hover {
      background: rgba(0, 0, 0, 0.4);
      border-color: rgba(255, 255, 255, 0.3);
    }
    .shortcut-keys.recording {
      background: rgba(255, 193, 7, 0.3);
      border-color: #ffc107;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .edit-btn, .save-btn, .cancel-btn, .reset-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }
    .edit-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }
    .edit-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    .save-btn {
      background: #4caf50;
      color: white;
    }
    .save-btn:hover {
      background: #43a047;
    }
    .cancel-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }
    .cancel-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    .reset-btn {
      background: #ff5722;
      color: white;
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      font-size: 14px;
    }
    .reset-btn:hover {
      background: #e64a19;
    }
    .tip {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255, 193, 7, 0.2);
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
    }
    .message {
      padding: 12px 16px;
      border-radius: 8px;
      margin-top: 15px;
      font-size: 14px;
      display: none;
    }
    .message.show {
      display: block;
    }
    .message.success {
      background: rgba(76, 175, 80, 0.3);
      border: 1px solid #4caf50;
    }
    .message.error {
      background: rgba(244, 67, 54, 0.3);
      border: 1px solid #f44336;
    }
    .info-bar {
      background: rgba(255, 255, 255, 0.1);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .platform-badge {
      background: rgba(255, 255, 255, 0.2);
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .status-dot.active {
      background: #4caf50;
    }
    .status-dot.inactive {
      background: #f44336;
    }
    .config-path {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      opacity: 0.8;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>全局快捷键演示</h1>
    
    <div class="info-bar">
      <div>
        <span id="platformBadge" class="platform-badge"></span>
      </div>
      <div style="font-size: 12px; opacity: 0.8;">
        配置文件: <span id="configPath" class="config-path"></span>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="overview">快捷键概览</button>
      <button class="tab-btn" data-tab="settings">自定义设置</button>
    </div>

    <div id="overview" class="tab-content active">
      <ul id="overviewList" class="shortcut-list"></ul>
      <div class="tip">
        提示：你可以最小化或隐藏窗口，使用设置的快捷键重新打开
      </div>
    </div>

    <div id="settings" class="tab-content">
      <ul id="settingsList" class="shortcut-list"></ul>
      <button id="resetBtn" class="reset-btn">恢复默认快捷键</button>
      <div id="message" class="message"></div>
    </div>
  </div>

  <script>
    const api = window.shortcutAPI;
    let currentShortcuts = {};
    let registeredIds = [];
    let editingId = null;
    let recordingKeys = [];
    let isRecording = false;

    async function loadShortcuts() {
      const data = await api.getShortcuts();
      currentShortcuts = data.config;
      registeredIds = data.registered.map(s => s.id);
      
      document.getElementById('platformBadge').textContent = 
        `${data.platform === 'darwin' ? 'macOS' : data.platform} · ${data.modifier} 键`;
      document.getElementById('configPath').textContent = data.configPath || '';
      
      renderOverview();
      renderSettings();
    }

    function formatAccelerator(accelerator) {
      return accelerator.replace(/\+/g, ' + ');
    }

    function isRegistered(id) {
      return registeredIds.includes(id);
    }

    function renderOverview() {
      const list = document.getElementById('overviewList');
      list.innerHTML = '';
      
      for (const [id, config] of Object.entries(currentShortcuts)) {
        const active = isRegistered(id);
        const li = document.createElement('li');
        li.className = 'shortcut-item';
        li.innerHTML = `
          <div class="shortcut-info">
            <div class="shortcut-desc">
              <span class="status-dot ${active ? 'active' : 'inactive'}"></span>
              ${config.description}
            </div>
          </div>
          <span class="shortcut-keys">${formatAccelerator(config.accelerator)}</span>
        `;
        list.appendChild(li);
      }
    }

    function renderSettings() {
      const list = document.getElementById('settingsList');
      list.innerHTML = '';
      
      for (const [id, config] of Object.entries(currentShortcuts)) {
        const active = isRegistered(id);
        const isEditing = editingId === id;
        const li = document.createElement('li');
        li.className = 'shortcut-item';
        li.dataset.id = id;
        
        if (isEditing) {
          li.innerHTML = `
            <div class="shortcut-info">
              <div class="shortcut-desc">
                <span class="status-dot ${active ? 'active' : 'inactive'}"></span>
                ${config.description}
              </div>
              <div class="shortcut-id">ID: ${id}</div>
            </div>
            <div class="shortcut-edit">
              <span class="shortcut-keys recording" data-role="recorder">
                按下快捷键组合...
              </span>
              <button class="save-btn" data-action="save" disabled>保存</button>
              <button class="cancel-btn" data-action="cancel">取消</button>
            </div>
          `;
        } else {
          li.innerHTML = `
            <div class="shortcut-info">
              <div class="shortcut-desc">
                <span class="status-dot ${active ? 'active' : 'inactive'}"></span>
                ${config.description}
              </div>
              <div class="shortcut-id">ID: ${id}</div>
            </div>
            <div class="shortcut-edit">
              <span class="shortcut-keys" data-role="display">${formatAccelerator(config.accelerator)}</span>
              <button class="edit-btn" data-action="edit">修改</button>
            </div>
          `;
        }
        
        list.appendChild(li);
      }
    }

    function showMessage(text, type = 'success') {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = `message show ${type}`;
      setTimeout(() => {
        msg.className = 'message';
      }, 3000);
    }

    function startRecording(id) {
      if (editingId && editingId !== id) {
        stopRecording(false);
      }
      
      editingId = id;
      isRecording = true;
      recordingKeys = [];
      renderSettings();
      
      setTimeout(() => {
        const recorder = document.querySelector('[data-role="recorder"]');
        if (recorder) {
          recorder.focus();
        }
      }, 50);
    }

    function stopRecording(save = false) {
      isRecording = false;
      if (!save) {
        recordingKeys = [];
      }
      editingId = null;
      renderSettings();
    }

    function normalizeKey(key) {
      const keyMap = {
        'Control': 'Ctrl',
        'Meta': 'Command',
        ' ': 'Space',
        'ArrowUp': 'Up',
        'ArrowDown': 'Down',
        'ArrowLeft': 'Left',
        'ArrowRight': 'Right',
        'Escape': 'Esc',
        'Delete': 'Del',
        'Backspace': 'Backspace'
      };
      return keyMap[key] || key;
    }

    function isModifierKey(key) {
      return ['Control', 'Ctrl', 'Alt', 'Shift', 'Meta', 'Command'].includes(key);
    }

    function buildAccelerator(keys) {
      const modifier = api.modifier;
      const modifierKeys = [];
      let mainKey = null;
      
      for (const key of keys) {
        if (isModifierKey(key)) {
          modifierKeys.push(key);
        } else {
          mainKey = key;
        }
      }
      
      if (!mainKey) return null;
      
      const parts = [];
      
      if (modifierKeys.length > 0) {
        parts.push(...modifierKeys);
      }
      
      parts.push(mainKey);
      
      return parts.join('+');
    }

    async function saveShortcut(id, accelerator) {
      const result = await api.updateShortcut(id, accelerator);
      if (result.success) {
        showMessage(result.message || '快捷键更新成功', 'success');
        await loadShortcuts();
      } else {
        showMessage(result.error || '更新失败', 'error');
      }
      return result.success;
    }

    async function resetAllShortcuts() {
      if (confirm('确定要恢复所有快捷键到默认设置吗？')) {
        await api.resetShortcuts();
        showMessage('已恢复默认快捷键', 'success');
        await loadShortcuts();
      }
    }

    document.addEventListener('click', async (e) => {
      const action = e.target.dataset.action;
      const id = e.target.closest('.shortcut-item')?.dataset.id;
      
      if (action === 'edit' && id) {
        startRecording(id);
      } else if (action === 'cancel') {
        stopRecording(false);
      } else if (action === 'save' && id && recordingKeys.length > 0) {
        const accelerator = buildAccelerator(recordingKeys);
        if (accelerator) {
          const validation = await api.validateAccelerator(accelerator, id);
          if (validation.valid) {
            const success = await saveShortcut(id, accelerator);
            if (success) {
              stopRecording(true);
            }
          } else {
            showMessage(validation.error, 'error');
          }
        } else {
          showMessage('无效的快捷键组合', 'error');
        }
      }
    });

    document.getElementById('resetBtn').addEventListener('click', resetAllShortcuts);

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tabId = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(tabId).classList.add('active');
        
        if (tabId === 'overview') {
          stopRecording(false);
          renderOverview();
        } else {
          renderSettings();
        }
      });
    });

    document.addEventListener('keydown', (e) => {
      if (!isRecording || !editingId) return;
      
      e.preventDefault();
      e.stopPropagation();
      
      const key = normalizeKey(e.key);
      
      if (!recordingKeys.includes(key)) {
        recordingKeys.push(key);
      }
      
      const recorder = document.querySelector('[data-role="recorder"]');
      const saveBtn = document.querySelector('[data-action="save"]');
      
      if (recorder) {
        const displayKeys = recordingKeys.map(k => {
          if (k === 'Command' || k === 'Ctrl') return api.modifier;
          return k;
        });
        recorder.textContent = displayKeys.join(' + ');
      }
      
      const hasMainKey = recordingKeys.some(k => !isModifierKey(k));
      if (saveBtn && hasMainKey) {
        saveBtn.disabled = false;
      }
    });

    document.addEventListener('keyup', (e) => {
      if (!isRecording || !editingId) return;
      
      const hasMainKey = recordingKeys.some(k => !isModifierKey(k));
      
      if (hasMainKey && recordingKeys.length >= 2) {
        setTimeout(async () => {
          const accelerator = buildAccelerator(recordingKeys);
          if (accelerator) {
            const validation = await api.validateAccelerator(accelerator, editingId);
            if (validation.valid) {
              const success = await saveShortcut(editingId, accelerator);
              if (success) {
                stopRecording(true);
              }
            } else {
              showMessage(validation.error, 'error');
            }
          }
        }, 100);
      }
    });

    loadShortcuts();
  </script>
</body>
</html>
