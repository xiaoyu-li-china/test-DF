version: '3.8'

services:
  app:
    build: .
    container_name: node-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
      - WATCHPACK_POLLING=true
    command: npm run dev
    tty: true
    stdin_open: true
    restart: unless-stopped
