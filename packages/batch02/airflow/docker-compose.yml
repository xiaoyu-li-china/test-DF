version: "3.8"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY}
    - AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS=False
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY}
    - DBT_HOST=postgres_dw
    - DBT_PORT=5432
    - DBT_USER=dbt_user
    - DBT_PASSWORD=${DBT_PASSWORD}
    - DBT_DBNAME=data_warehouse
  volumes:
    - ./dags:/opt/airflow/dags
    - ../:/opt/airflow/dags/dbt/data_warehouse
    - dbt-target:/opt/airflow/dags/dbt/data_warehouse/target
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-Shell", "pg_isready -U airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  postgres_dw:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dbt_user
      POSTGRES_PASSWORD: ${DBT_PASSWORD}
      POSTGRES_DB: data_warehouse
    ports:
      - "5433:5432"
    volumes:
      - dw_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-Shell", "pg_isready -U dbt_user -d data_warehouse"]
      interval: 10s
      retries: 5
      start_period: 5s

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  dw_data:
  dbt-target:
