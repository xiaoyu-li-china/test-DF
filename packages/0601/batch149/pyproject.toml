[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "nightstock"
version = "0.1.0"
description = "夜市摆摊库存和毛利管理 CLI 工具"
requires-python = ">=3.8"
dependencies = [
    "click>=8.0",
    "tabulate>=0.9.0",
    "requests>=2.0",
]

[project.optional-dependencies]
ocr = ["pytesseract>=0.3.10", "Pillow>=10.0"]

[project.scripts]
nightstock = "nightstock.cli:cli"
ns = "nightstock.cli:cli"

[tool.setuptools.packages.find]
where = ["."]
